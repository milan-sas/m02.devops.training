version: v1.0
name: "\U0001F31F Fan-In/Fan-Out Pipeline"
agent:
  machine:
    type: r1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - checkout
      - cache restore pip-$(checksum requirements.txt)
      - python3 -m pip install --quiet --break-system-packages pytest requests flask coverage locust
      - cache store pip-$(checksum requirements.txt) ~/.cache/pip
      - 'export PATH=$PATH:/home/semaphore/.local/bin'
blocks:
  - name: TDD Tests
    dependencies: []
    task:
      jobs:
        - name: TDD
          commands:
            - cd 1-tdd
            - pytest
  - name: Integration Testing
    dependencies:
      - TDD Tests
    task:
      jobs:
        - name: Integration
          commands:
            - cd 3-integration-testing
            - pytest
            - cd ../6-mocking
            - pytest
  - name: End-to-end tests
    dependencies:
      - Integration Testing
    task:
      jobs:
        - name: E2E
          commands:
            - cd 4-e2e && nohup python3 app.py > /tmp/flask.log 2>&1 &
            - sleep 3
            - cat /tmp/flask.log
            - cd 4-e2e && pytest test_e2e.py -v
  - name: Code Coverage
    dependencies:
      - End-to-end tests
    task:
      jobs:
        - name: Create code coverage
          commands:
            - cd 7-test-coverage
            - coverage run -m pytest
            - coverage report -m
            - coverage html
            - tar -czf coverage-report.tar.gz htmlcov
            - artifact push workflow coverage-report.tar.gz
  - name: Reports
    dependencies:
      - Code Coverage
    task:
      jobs:
        - name: Test reports
          commands:
            - cd 5-test-reports
            - pip install -r requirements.txt
            - pytest --junitxml=reports.xml; echo $? > pytest_exit_code
            - test-results publish --name "Test Reports" reports.xml
            - artifact push workflow reports.xml
            - exit $(cat pytest_exit_code)
after_pipeline:
  task:
    jobs:
      - name: Report Generation
        commands:
          - test-results gen-pipeline-report
promotions:
  - name: Promotion 1
    pipeline_file: pipeline_2.yml
