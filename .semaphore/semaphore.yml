version: v1.0
name: "\U0001F31F Fan-In/Fan-Out Pipeline"
agent:
  machine:
    type: r1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - checkout
      - pip install pytest requests flask coverage locust
      - 'export PATH=$PATH:/home/semaphore/.local/bin'
blocks:
  - name: TDD Tests
    dependencies: []
    task:
      jobs:
        - name: TDD
          commands:
            - cd 1-tdd
            - pytest
  - name: Integration Testing
    dependencies:
      - TDD Tests
    task:
      jobs:
        - name: Integration
          commands:
            - cd 3-integration-testing
            - pytest
            - cd 6-mocking
            - pytest
  - name: 'End-to-end tests '
    dependencies:
      - Integration Testing
    task:
      jobs:
        - name: E2E
          commands:
            - cd 4-e2e
            - pytest
    skip:
      when: branch = 'setup-semaphore'
  - name: Test coverage
    dependencies:
      - 'End-to-end tests '
    task:
      jobs:
        - name: Coverage
          commands:
            - cd 7-test-coverage
            - coverage run -m pytest
            - coverage report -m
            - coverage html
            - artifact push workflow htmlcov
after_pipeline:
  task:
    jobs:
      - name: 'Job #1'
        commands: []
promotions:
  - name: Promotion 1
    pipeline_file: pipeline_2.yml
