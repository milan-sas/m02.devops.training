version: v1.0
name: "\U0001F31F Fan-In/Fan-Out Pipeline"
agent:
  machine:
    type: r1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - checkout
      - pip install pytest requests flask coverage locust coverage
      - 'export PATH=$PATH:/home/semaphore/.local/bin'
blocks:
  - name: cd 1-tdd
    dependencies: []
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 1-tdd
            - pytest
  - name: 'Block #2'
    dependencies:
      - cd 1-tdd
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 3-integration-testing
            - pytest
  - name: 'Block #3'
    dependencies:
      - 'Block #2'
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 6-mocking
            - pytest
  - name: 'Block #4'
    dependencies:
      - 'Block #3'
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 7-test-coverage
            - pytest
            - coverage run -m pytest test_calculator.py
            - coverage report -m
            - coverage html
            - "artifact push workflow ///home/semaphore/m02.devops.training/7-test-coverage/htmlcov/index.html\ahtmlcov/index.html\e"
