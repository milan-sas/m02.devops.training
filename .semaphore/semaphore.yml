version: v1.0
name: "\U0001F31F Fan-In/Fan-Out Pipeline"
agent:
  machine:
    type: r1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - checkout
      - pip install pytest requests flask coverage locust
      - 'export PATH=$PATH:/home/semaphore/.local/bin'
blocks:
  - name: cd 1-tdd
    dependencies: []
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 1-tdd
            - pytest
